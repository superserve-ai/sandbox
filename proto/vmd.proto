syntax = "proto3";

package superserve.vmd.v1;

option go_package = "github.com/superserve-ai/sandbox/proto/vmdpb";

// VMDaemon manages Firecracker microVM lifecycles for the AgentBox platform.
service VMDaemon {
  // CreateVM provisions a new microVM with the specified configuration.
  rpc CreateVM(CreateVMRequest) returns (CreateVMResponse);

  // DestroyVM terminates a running microVM and cleans up all associated resources.
  rpc DestroyVM(DestroyVMRequest) returns (DestroyVMResponse);

  // PauseVM snapshots a running VM's state and suspends it (sleep).
  rpc PauseVM(PauseVMRequest) returns (PauseVMResponse);

  // ResumeVM restores a paused VM from its snapshot, optionally into a pre-warmed slot.
  rpc ResumeVM(ResumeVMRequest) returns (ResumeVMResponse);

  // CreateSnapshot captures a point-in-time snapshot of a running VM.
  rpc CreateSnapshot(CreateSnapshotRequest) returns (CreateSnapshotResponse);

  // RestoreSnapshot boots a VM from a previously captured snapshot.
  rpc RestoreSnapshot(RestoreSnapshotRequest) returns (RestoreSnapshotResponse);

  // DeleteSnapshot removes a snapshot's on-disk artifacts (vmstate + memory
  // file). Idempotent — missing files are treated as success. Used by the
  // control plane to garbage-collect the previous snapshot when a sandbox is
  // re-paused and only the latest snapshot is reachable.
  rpc DeleteSnapshot(DeleteSnapshotRequest) returns (DeleteSnapshotResponse);

  // ExecCommand runs a command inside a VM and streams stdout/stderr back.
  rpc ExecCommand(ExecCommandRequest) returns (stream ExecCommandResponse);

  // GetVMInfo returns the current status and metadata of a VM.
  rpc GetVMInfo(GetVMInfoRequest) returns (GetVMInfoResponse);

  // SetupNetwork configures networking for a VM (TAP device, NAT, IP allocation).
  rpc SetupNetwork(SetupNetworkRequest) returns (SetupNetworkResponse);

  // UpdateSandboxNetwork atomically replaces the egress allow/deny rules for a running VM.
  rpc UpdateSandboxNetwork(UpdateSandboxNetworkRequest) returns (UpdateSandboxNetworkResponse);

  // BuildTemplate kicks off a template build asynchronously. Returns a
  // build_vm_id immediately; the caller polls GetBuildStatus(build_vm_id)
  // for progress and uses CancelBuild(build_vm_id) to abort.
  rpc BuildTemplate(BuildTemplateRequest) returns (BuildTemplateResponse);

  // GetBuildStatus returns the current state of a build dispatched via
  // BuildTemplate. Used by the control plane's build supervisor to poll
  // until a terminal status is reached.
  rpc GetBuildStatus(GetBuildStatusRequest) returns (GetBuildStatusResponse);

  // CancelBuild aborts an in-flight build and tears down the build VM.
  // Idempotent — no-op for unknown or already-terminal builds.
  rpc CancelBuild(CancelBuildRequest) returns (CancelBuildResponse);

  // StreamBuildLogs returns a server-streaming feed of log events for a
  // build. Replays buffered history in order first, then streams live
  // events as they arrive. Closes when the build reaches a terminal
  // status. Used by the control plane to drive /builds/:id/logs SSE.
  rpc StreamBuildLogs(StreamBuildLogsRequest) returns (stream BuildLogEvent);
}

// ---------------------------------------------------------------------------
// BuildTemplate
// ---------------------------------------------------------------------------

message BuildTemplateRequest {
  string template_id = 1;          // Key under which the snapshot is registered.
  string from = 2;                 // OCI image reference, e.g. "python:3.11".
  repeated BuildStep steps = 3;    // Ordered build steps executed inside the VM.
  string start_cmd = 4;            // Optional: started before snapshot, captured live.
  string ready_cmd = 5;            // Optional: polled until exit 0 before snapshot.
  uint32 vcpu = 6;
  uint32 memory_mib = 7;
  uint32 disk_mib = 8;
}

message BuildStep {
  // Exactly one of the fields below is set per step. Matches the canonical
  // build_spec shape persisted in the template table's jsonb column.
  oneof op {
    string run = 1;              // Shell command run via /bin/sh -c.
    BuildCopyOp copy = 2;        // Base64 tar payload extracted at dst.
    BuildEnvOp env = 3;          // Env var applied to subsequent run steps.
    string workdir = 4;          // Working directory for subsequent run steps.
  }
}

message BuildCopyOp {
  string src = 1;   // Base64-encoded tar archive.
  string dst = 2;   // Absolute path inside the VM.
}

message BuildEnvOp {
  string key = 1;
  string value = 2;
}

message BuildTemplateResponse {
  // Opaque identifier the caller polls via GetBuildStatus. Typically
  // "build-" + template_id, but treat as opaque.
  string build_vm_id = 1;
}

// ---------------------------------------------------------------------------
// GetBuildStatus / CancelBuild
// ---------------------------------------------------------------------------

message GetBuildStatusRequest {
  string build_vm_id = 1;
}

message GetBuildStatusResponse {
  // One of: "running", "snapshotting", "ready", "failed", "cancelled".
  // "ready"/"failed"/"cancelled" are terminal — no future transitions.
  string status = 1;

  // Populated on ready.
  string snapshot_path = 2;
  string mem_file_path = 3;
  string rootfs_path = 4;
  string resolved_digest = 5;
  int64 size_bytes = 6;

  // Populated on failed / cancelled.
  string error_message = 7;

  int64 started_at_unix = 8;
  int64 ended_at_unix = 9;  // 0 until terminal.

  // Present when the caller's build_vm_id is unknown on this host.
  // Supervisors treat "unknown on this host" as a hard failure since vmd
  // doesn't survive across restarts for in-memory registry.
  bool not_found = 10;
}

message CancelBuildRequest {
  string build_vm_id = 1;
}

message CancelBuildResponse {}

message StreamBuildLogsRequest {
  string build_vm_id = 1;
}

message BuildLogEvent {
  int64 timestamp_unix = 1;       // Server-side emit time, seconds since epoch.
  int64 timestamp_unix_nanos = 2; // Nanos-since-epoch for sub-second ordering.
  // Stream source: "stdout" / "stderr" forwarded from boxd, "system" for
  // supervisor-emitted text (step boundaries, "snapshotting", terminal).
  string stream = 3;
  string text = 4;
  // Present on the final event emitted when the build finalizes. Caller
  // should close its SSE connection after receiving a finished event.
  bool finished = 5;
  string status = 6; // "ready" | "failed" | "cancelled", set when finished.
}

// ---------------------------------------------------------------------------
// Resource limits
// ---------------------------------------------------------------------------

message ResourceLimits {
  uint32 vcpu_count = 1;
  uint32 memory_mib = 2;
  uint32 disk_size_mib = 3;
  uint32 network_bandwidth_mbps = 4;
}

// ---------------------------------------------------------------------------
// Network configuration
// ---------------------------------------------------------------------------

message NetworkConfig {
  string host_interface = 1;   // e.g. "eth0"
  string subnet_cidr = 2;     // e.g. "10.0.0.0/24"
  string gateway_ip = 3;
  bool enable_nat = 4;
}

// SandboxNetworkConfig holds per-sandbox network rules.
message SandboxNetworkConfig {
  SandboxNetworkEgressConfig egress = 1;
}

// SandboxNetworkEgressConfig controls outbound traffic from a sandbox.
message SandboxNetworkEgressConfig {
  repeated string allowed_cidrs = 1;    // CIDRs explicitly allowed (e.g. "8.8.8.8/32").
  repeated string denied_cidrs = 2;     // CIDRs explicitly denied (e.g. "0.0.0.0/0" to block all).
  repeated string allowed_domains = 3;  // Domains allowed via TCP proxy (e.g. "api.openai.com", "*.github.com").
}

// ---------------------------------------------------------------------------
// CreateVM
// ---------------------------------------------------------------------------

message CreateVMRequest {
  string vm_id = 1;
  string base_rootfs_path = 2;   // Path to the base rootfs image.
  string kernel_path = 3;        // Path to the kernel image.
  string kernel_args = 4;        // Boot arguments for the kernel.
  ResourceLimits resource_limits = 5;
  NetworkConfig network_config = 6;
  map<string, string> metadata = 7;   // Arbitrary key-value pairs.
  SandboxNetworkConfig sandbox_network = 8;  // Per-sandbox egress rules (optional).
  map<string, string> env_vars = 9;   // Environment variables injected into every process in the VM.
  string template_id = 10;       // Which template snapshot to restore from. Empty string means "default".
}

message CreateVMResponse {
  string vm_id = 1;
  string socket_path = 2;
  string ip_address = 3;
  string tap_device = 4;
  uint32 pid = 5;
  ResourceLimits resource_limits = 6;
}

// ---------------------------------------------------------------------------
// DestroyVM
// ---------------------------------------------------------------------------

message DestroyVMRequest {
  string vm_id = 1;
  bool force = 2;   // If true, SIGKILL immediately; otherwise SIGTERM first.
}

message DestroyVMResponse {
  string vm_id = 1;
  bool cleaned_up = 2;
}

// ---------------------------------------------------------------------------
// PauseVM (sleep — snapshot then stop)
// ---------------------------------------------------------------------------

message PauseVMRequest {
  string vm_id = 1;
  string snapshot_dir = 2;   // Directory to store the snapshot artifacts.
}

message PauseVMResponse {
  string vm_id = 1;
  string snapshot_path = 2;
  string mem_file_path = 3;
}

// ---------------------------------------------------------------------------
// ResumeVM (wake from snapshot)
// ---------------------------------------------------------------------------

message ResumeVMRequest {
  string vm_id = 1;
  string snapshot_path = 2;
  string mem_file_path = 3;
  SandboxNetworkConfig sandbox_network = 4;  // Reapply egress rules after resume.
  map<string, string> env_vars = 5;          // Re-inject env vars after resume.
}

message ResumeVMResponse {
  string vm_id = 1;
  string socket_path = 2;
  string ip_address = 3;
  uint32 pid = 4;
  ResourceLimits resource_limits = 5;
}

// ---------------------------------------------------------------------------
// CreateSnapshot
// ---------------------------------------------------------------------------

message CreateSnapshotRequest {
  string vm_id = 1;
  string snapshot_dir = 2;
}

message CreateSnapshotResponse {
  string vm_id = 1;
  string snapshot_path = 2;
  string mem_file_path = 3;
  int64 created_at_unix = 4;
}

// ---------------------------------------------------------------------------
// RestoreSnapshot
// ---------------------------------------------------------------------------

message RestoreSnapshotRequest {
  string vm_id = 1;
  string snapshot_path = 2;
  string mem_file_path = 3;
  string overlay_path = 4;         // COW overlay for the restored rootfs.
  ResourceLimits resource_limits = 5;
  NetworkConfig network_config = 6;
}

message RestoreSnapshotResponse {
  string vm_id = 1;
  string socket_path = 2;
  string ip_address = 3;
  uint32 pid = 4;
  ResourceLimits resource_limits = 5;
}

// ---------------------------------------------------------------------------
// DeleteSnapshot
// ---------------------------------------------------------------------------

message DeleteSnapshotRequest {
  // Optional. Identifies the sandbox this snapshot belongs to — used for
  // logging and for a sanity check that the paths live inside the expected
  // snapshot directory. Never required for the delete itself.
  string vm_id = 1;
  // Absolute path to the vmstate snapshot file.
  string snapshot_path = 2;
  // Absolute path to the memory dump file.
  string mem_file_path = 3;
}

message DeleteSnapshotResponse {
  // True when both files are no longer on disk after this call — either
  // because this call removed them, or because they were already gone.
  bool deleted = 1;
}

// ---------------------------------------------------------------------------
// ExecCommand
// ---------------------------------------------------------------------------

message ExecCommandRequest {
  string vm_id = 1;
  string command = 2;
  repeated string args = 3;
  map<string, string> env = 4;
  string working_dir = 5;
  uint32 timeout_seconds = 6;
}

message ExecCommandResponse {
  bytes stdout = 1;
  bytes stderr = 2;
  int32 exit_code = 3;
  bool finished = 4;
}

// ---------------------------------------------------------------------------
// GetVMInfo
// ---------------------------------------------------------------------------

enum VMStatus {
  VM_STATUS_UNSPECIFIED = 0;
  VM_STATUS_CREATING = 1;
  VM_STATUS_RUNNING = 2;
  VM_STATUS_PAUSED = 3;
  VM_STATUS_STOPPED = 4;
  VM_STATUS_ERROR = 5;
}

message GetVMInfoRequest {
  string vm_id = 1;
}

message GetVMInfoResponse {
  string vm_id = 1;
  VMStatus status = 2;
  string socket_path = 3;
  string ip_address = 4;
  uint32 pid = 5;
  ResourceLimits resource_limits = 6;
  map<string, string> metadata = 7;
  int64 created_at_unix = 8;
  int64 uptime_seconds = 9;
}

// ---------------------------------------------------------------------------
// SetupNetwork
// ---------------------------------------------------------------------------

message SetupNetworkRequest {
  string vm_id = 1;
  NetworkConfig network_config = 2;
}

message SetupNetworkResponse {
  string vm_id = 1;
  string tap_device = 2;
  string vm_ip = 3;
  string gateway_ip = 4;
  string mac_address = 5;
}

// ---------------------------------------------------------------------------
// UpdateSandboxNetwork
// ---------------------------------------------------------------------------

message UpdateSandboxNetworkRequest {
  string vm_id = 1;
  SandboxNetworkEgressConfig egress = 2;  // New egress rules (replaces existing).
}

message UpdateSandboxNetworkResponse {
  string vm_id = 1;
}
