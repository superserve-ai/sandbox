name: Deploy VMD

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (staging always runs first)'
        required: false
        type: choice
        options:
          - staging
          - production
  push:
    branches: [main]
    paths:
      - 'cmd/vmd/**'
      - 'cmd/boxd/**'
      - 'internal/vm/**'
      - 'internal/network/**'
      - 'deploy/superserve-vmd.service'
      - 'deploy/firecracker@.service'
      - 'deploy/firecracker-netns@.service'
      - 'deploy/sandboxes.slice'
      - 'scripts/fc-cleanup'

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binaries
        # Always rebuild both. The previous HEAD~1..HEAD diff check for boxd
        # dropped the build whenever the triggering commit didn't touch
        # cmd/boxd/** — even if an earlier commit in the same push did.
        # That caused silent "stale boxd" deploys where the rootfs kept
        # running yesterday's guest agent. boxd is tiny (~13 MB) and
        # compiles in seconds; just always building it avoids a whole
        # class of drift. Rootfs rebuild downstream keys off the
        # produced binary's hash so no-op rebuilds are still cheap.
        run: |
          mkdir -p bin
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags '-s -w' -trimpath -o bin/vmd ./cmd/vmd
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags '-s -w' -trimpath -o bin/boxd ./cmd/boxd

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Discover and deploy to VMD instances
        env:
          GCP_PROJECT: ${{ vars.GCP_PROJECT }}
          VMD_LABEL: ${{ vars.VMD_LABEL }}
          VMD_SERVICE: ${{ vars.VMD_SERVICE }}
          VMD_INSTALL_DIR: ${{ vars.VMD_INSTALL_DIR }}
          SHA: ${{ github.sha }}
        run: |
          python3 - <<'PYEOF'
          import os, sys, subprocess, textwrap
          from concurrent.futures import ThreadPoolExecutor, as_completed

          project     = os.environ['GCP_PROJECT']
          label       = os.environ.get('VMD_LABEL', 'component=vmd')
          service     = os.environ.get('VMD_SERVICE', 'superserve-vmd')
          install_dir = os.environ.get('VMD_INSTALL_DIR', '/usr/local/bin')
          sha         = os.environ['SHA'][:8]

          result = subprocess.run([
              'gcloud', 'compute', 'instances', 'list',
              f'--project={project}',
              f'--filter=labels.{label} AND status=RUNNING',
              '--format=csv[no-heading](name,zone)',
          ], capture_output=True, text=True, check=True)

          instances = [
              {'name': r[0], 'zone': r[1]}
              for line in result.stdout.strip().splitlines()
              if line.strip()
              for r in [line.strip().split(',')]
          ]

          if not instances:
              print(f'No instances with label {label} found in {project}', file=sys.stderr)
              sys.exit(1)

          print(f'Deploying VMD to {len(instances)} instance(s)')

          def deploy(inst):
              name, zone = inst['name'], inst['zone']
              tag = f'{name}/{zone}'
              scp = lambda src, dst: subprocess.run([
                  'gcloud', 'compute', 'scp', src, f'{name}:{dst}',
                  f'--zone={zone}', f'--project={project}',
                  '--quiet', '--tunnel-through-iap',
              ], check=True, capture_output=True)

              # Upload binaries — always upload both. The remote script
              # below compares hashes before installing boxd and rebuilding
              # the rootfs, so an unchanged binary is a no-op at rest.
              scp('bin/vmd', f'/tmp/vmd-{sha}')
              scp('bin/boxd', f'/tmp/boxd-{sha}')

              # Upload systemd units and helper scripts
              scp('deploy/superserve-vmd.service', '/tmp/superserve-vmd.service')
              scp('deploy/firecracker@.service', '/tmp/firecracker@.service')
              scp('deploy/firecracker-netns@.service', '/tmp/firecracker-netns@.service')
              scp('deploy/sandboxes.slice', '/tmp/sandboxes.slice')
              scp('scripts/fc-cleanup', '/tmp/fc-cleanup')
              print(f'[{tag}] files uploaded')

              inject_script = textwrap.dedent(f'''
                  set -euo pipefail

                  # Install VMD binary
                  sudo mv /tmp/vmd-{sha} {install_dir}/vmd
                  sudo chmod +x {install_dir}/vmd

                  # Install systemd units
                  sudo mv /tmp/superserve-vmd.service /etc/systemd/system/superserve-vmd.service
                  sudo mv /tmp/firecracker@.service /etc/systemd/system/firecracker@.service
                  sudo mv /tmp/firecracker-netns@.service /etc/systemd/system/firecracker-netns@.service
                  sudo mv /tmp/sandboxes.slice /etc/systemd/system/sandboxes.slice
                  sudo systemctl daemon-reload

                  # Install helper scripts
                  sudo mv /tmp/fc-cleanup {install_dir}/fc-cleanup
                  sudo chmod +x {install_dir}/fc-cleanup

                  # Inject boxd + rebuild rootfs only if the new binary
                  # differs from what's already installed. `-trimpath
                  # -ldflags '-s -w'` makes Go builds reproducible, so
                  # hashes only differ when source actually changed. This
                  # replaces the old "compare against HEAD~1" git diff
                  # check, which missed boxd changes that landed in any
                  # commit other than the very last one on a push.
                  NEW_HASH=$(sha256sum /tmp/boxd-{sha} | awk '{{print $1}}')
                  CUR_HASH=$(sha256sum {install_dir}/boxd 2>/dev/null | awk '{{print $1}}' || echo none)

                  if [ "$NEW_HASH" != "$CUR_HASH" ]; then
                      echo "boxd changed ($CUR_HASH -> $NEW_HASH) — installing + rebuilding rootfs"
                      sudo install -m 0755 /tmp/boxd-{sha} {install_dir}/boxd
                      rm -f /tmp/boxd-{sha}

                      ROOTFS=""
                      for env_file in /etc/sandbox/vmd.env; do
                          if [ -f "$env_file" ]; then
                              candidate=$(grep "^BASE_ROOTFS_PATH=" "$env_file" | head -1 | cut -d= -f2) || true
                              if [ -n "$candidate" ]; then
                                  ROOTFS="$candidate"
                                  break
                              fi
                          fi
                      done

                      if [ -n "$ROOTFS" ] && [ -f "$ROOTFS" ]; then
                          STAGING="$ROOTFS.new.$$"
                          MNT=$(mktemp -d)
                          trap '\''if mountpoint -q "$MNT" 2>/dev/null; then sudo umount "$MNT" || true; fi; rmdir "$MNT" 2>/dev/null || true; sudo rm -f "$STAGING" 2>/dev/null || true'\'' EXIT

                          sudo cp --reflink=auto "$ROOTFS" "$STAGING"
                          sudo mount -o loop "$STAGING" "$MNT"
                          sudo cp {install_dir}/boxd "$MNT/usr/local/bin/boxd"
                          sudo chmod +x "$MNT/usr/local/bin/boxd"
                          sudo umount "$MNT"
                          rmdir "$MNT"
                          sudo mv "$STAGING" "$ROOTFS"
                          trap - EXIT
                          echo "boxd injected into rootfs"
                      else
                          echo "WARNING: BASE_ROOTFS_PATH not found; skipping rootfs inject"
                      fi
                  else
                      echo "boxd unchanged ($CUR_HASH) — skipping install + rootfs rebuild"
                      rm -f /tmp/boxd-{sha}
                  fi

                  # Restart VMD only. Proxy is NOT restarted — it has its own pipeline.
                  sudo systemctl restart {service}
                  sleep 3
                  sudo systemctl is-active --quiet {service} || (
                      echo "ERROR: {service} failed to become active after restart" >&2
                      sudo systemctl status --no-pager {service} >&2 || true
                      sudo journalctl -u {service} --no-pager -n 40 >&2 || true
                      exit 1
                  )
              ''')
              r = subprocess.run([
                  'gcloud', 'compute', 'ssh', name,
                  f'--zone={zone}', f'--project={project}',
                  '--quiet', '--tunnel-through-iap',
                  '--command', inject_script,
              ], capture_output=True, text=True)
              if r.returncode != 0:
                  raise RuntimeError(
                      f'service not healthy\n'
                      f'--- stdout ---\n{r.stdout}\n'
                      f'--- stderr ---\n{r.stderr}'
                  )
              print(f'[{tag}] active')
              if r.stdout.strip():
                  print(f'[{tag}] {r.stdout.strip()}')

          failed = []
          with ThreadPoolExecutor(max_workers=len(instances)) as ex:
              futures = {ex.submit(deploy, inst): inst for inst in instances}
              for f in as_completed(futures):
                  inst = futures[f]
                  try:
                      f.result()
                  except Exception as e:
                      tag = f"{inst['name']}/{inst['zone']}"
                      print(f'[{tag}] FAILED: {e}', file=sys.stderr)
                      failed.append(tag)

          if failed:
              print(f'Deploy failed on: {", ".join(failed)}', file=sys.stderr)
              sys.exit(1)

          print(f'Deployed VMD to {len(instances)} instance(s). sha={sha}')
          PYEOF
