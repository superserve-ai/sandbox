# Deploy VMD — control plane VMs.
#
# Production NEVER deploys without staging first — same discipline as Deploy API.
# The deploy-production job reuses the same step body as deploy-staging; env vars
# like GCP_PROJECT resolve per-environment from GitHub environment vars.

name: Deploy VMD

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (staging always runs first)'
        required: false
        type: choice
        options:
          - staging
          - production
  push:
    branches: [main]
    paths:
      - 'cmd/vmd/**'
      - 'cmd/boxd/**'
      - 'cmd/template-builder/**'
      - 'internal/vm/**'
      - 'internal/network/**'
      - 'deploy/superserve-vmd.service'
      - 'deploy/firecracker@.service'
      - 'deploy/firecracker-netns@.service'
      - 'deploy/sandboxes.slice'
      - 'scripts/fc-cleanup'

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binaries
        # Always build all three. Hash-compare on the host decides whether
        # to install boxd + rebuild the rootfs, so a no-op is cheap at rest.
        # The previous HEAD~1..HEAD diff check missed boxd changes that
        # landed in any commit other than the last one on a push.
        run: |
          mkdir -p bin
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags '-s -w' -trimpath -o bin/vmd ./cmd/vmd
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags '-s -w' -trimpath -o bin/boxd ./cmd/boxd
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags '-s -w' -trimpath -o bin/template-builder ./cmd/template-builder

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Discover and deploy to VMD instances
        env:
          GCP_PROJECT: ${{ vars.GCP_PROJECT }}
          VMD_LABEL: ${{ vars.VMD_LABEL }}
          VMD_SERVICE: ${{ vars.VMD_SERVICE }}
          VMD_INSTALL_DIR: ${{ vars.VMD_INSTALL_DIR }}
          SHA: ${{ github.sha }}
        run: |
          python3 .github/workflows/scripts/deploy-vmd.py

  deploy-production:
    if: github.event_name == 'push' || github.event.inputs.environment == 'production'
    needs: [deploy-staging]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binaries
        # Always build all three; hash-compare on the host decides install.
        run: |
          mkdir -p bin
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags '-s -w' -trimpath -o bin/vmd ./cmd/vmd
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags '-s -w' -trimpath -o bin/boxd ./cmd/boxd
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags '-s -w' -trimpath -o bin/template-builder ./cmd/template-builder

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Discover and deploy to VMD instances
        env:
          GCP_PROJECT: ${{ vars.GCP_PROJECT }}
          VMD_LABEL: ${{ vars.VMD_LABEL }}
          VMD_SERVICE: ${{ vars.VMD_SERVICE }}
          VMD_INSTALL_DIR: ${{ vars.VMD_INSTALL_DIR }}
          SHA: ${{ github.sha }}
        run: |
          python3 .github/workflows/scripts/deploy-vmd.py
