# Deploy Proxy — edge proxy on the VMD hosts.
#
# Production NEVER deploys without staging first. Same pattern as Deploy API /
# Deploy VMD.

name: Deploy Proxy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (staging always runs first)'
        required: false
        type: choice
        options:
          - staging
          - production
  push:
    branches: [main]
    paths:
      - 'cmd/proxy/**'
      - 'internal/proxy/**'
      - 'internal/auth/**'
      - 'deploy/proxy.service'

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build proxy binary
        run: |
          mkdir -p bin
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags '-s -w' -o bin/proxy ./cmd/proxy

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Discover and deploy proxy to VMD instances
        env:
          GCP_PROJECT: ${{ vars.GCP_PROJECT }}
          VMD_LABEL: ${{ vars.VMD_LABEL }}
          VMD_INSTALL_DIR: ${{ vars.VMD_INSTALL_DIR }}
          SHA: ${{ github.sha }}
          SANDBOX_ACCESS_TOKEN_SEED: ${{ secrets.SANDBOX_ACCESS_TOKEN_SEED_STAGING }}
          PROXY_ALLOWED_ORIGINS: ${{ vars.PROXY_ALLOWED_ORIGINS_STAGING }}
          REQUIRE_DATA_PLANE: ${{ vars.REQUIRE_DATA_PLANE_STAGING }}
        run: |
          python3 .github/workflows/scripts/deploy-proxy.py

  deploy-production:
    if: github.event_name == 'push' || github.event.inputs.environment == 'production'
    needs: [deploy-staging]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build proxy binary
        run: |
          mkdir -p bin
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags '-s -w' -o bin/proxy ./cmd/proxy

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Discover and deploy proxy to VMD instances
        env:
          GCP_PROJECT: ${{ vars.GCP_PROJECT }}
          VMD_LABEL: ${{ vars.VMD_LABEL }}
          VMD_INSTALL_DIR: ${{ vars.VMD_INSTALL_DIR }}
          SHA: ${{ github.sha }}
          SANDBOX_ACCESS_TOKEN_SEED: ${{ secrets.SANDBOX_ACCESS_TOKEN_SEED_PROD }}
          PROXY_ALLOWED_ORIGINS: ${{ vars.PROXY_ALLOWED_ORIGINS_PROD }}
          REQUIRE_DATA_PLANE: ${{ vars.REQUIRE_DATA_PLANE_PROD }}
        run: |
          python3 .github/workflows/scripts/deploy-proxy.py
