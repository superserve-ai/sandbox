name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run unit tests
        run: go test -v -short -count=1 -race ./...

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sandbox_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run integration tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/sandbox_test?sslmode=disable
        run: go test -v -tags integration -count=1 -race -timeout 10m ./internal/integration/

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build all binaries
        run: |
          go build -ldflags "-s -w" -o /dev/null ./cmd/controlplane
          go build -ldflags "-s -w" -o /dev/null ./cmd/vmd
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "-s -w" -o /dev/null ./cmd/boxd

  vet:
    name: Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Go vet
        run: go vet ./...

  sqlc-check:
    name: sqlc Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: sqlc-dev/setup-sqlc@v4
        with:
          sqlc-version: '1.30.0'

      - name: Verify sqlc generated code is up to date
        run: |
          sqlc generate
          if ! git diff --quiet --exit-code; then
            echo "::error::sqlc generated code is out of date. Run 'sqlc generate' and commit the result."
            git diff
            exit 1
          fi

  migration-order:
    name: Migration Order
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reject migrations dated at or before the highest on main
        run: |
          git fetch origin main
          HIGHEST_MAIN=$(git ls-tree -r origin/main --name-only \
            | grep '^supabase/migrations/' \
            | grep -oE '[0-9]{14}' \
            | sort -n | tail -n1)
          if [ -z "$HIGHEST_MAIN" ]; then
            echo "no migrations on main yet; nothing to compare against"
            exit 0
          fi
          echo "highest version on main: $HIGHEST_MAIN"

          NEW=$(git diff --name-status origin/main...HEAD -- supabase/migrations/ \
            | awk '$1=="A" {print $2}')
          if [ -z "$NEW" ]; then
            echo "no new migrations in this PR"
            exit 0
          fi

          fail=0
          for file in $NEW; do
            v=$(basename "$file" | grep -oE '^[0-9]{14}')
            if [ "$v" -le "$HIGHEST_MAIN" ]; then
              echo "::error file=$file::migration $v is at or before highest-on-main $HIGHEST_MAIN — supabase db push will refuse without --include-all; bump the timestamp"
              fail=1
            fi
          done
          [ $fail -eq 0 ] && echo "all new migrations are correctly ordered"
          exit $fail
