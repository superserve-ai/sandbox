openapi: 3.1.0
info:
  title: Superserve API
  version: 0.1.0
  description: |
    Superserve provides sandbox infrastructure to run AI Agents in the cloud. Powered by Firecracker MicroVMs.

    ## Sandbox lifecycle

    ```
    starting --> active <--> paused --> deleted
    ```

    | Endpoint | What it does |
    |----------|-------------|
    | `POST /sandboxes` | Create a new sandbox |
    | `PATCH /sandboxes/:id` | Partially update a running sandbox (e.g. network rules) |
    | `POST /sandboxes/:id/pause` | Snapshot full state, suspend the VM |
    | `POST /sandboxes/:id/resume` | Restore from snapshot, continue where it left off |
    | `DELETE /sandboxes/:id` | Delete sandbox and all resources |

    ## Sandbox environment

    Each sandbox runs Ubuntu 24.04 with 1 vCPU, 1 GB RAM, 4 GB disk.
    Pre-installed: Python 3.12, Node.js 22, npm, git, curl, build-essential.
  contact:
    name: Superserve Team
  license:
    name: Proprietary

servers:
  - url: https://api-staging.superserve.ai
    description: Staging
  - url: https://api.superserve.ai
    description: Production
  - url: http://localhost:8080
    description: Local development

paths:
  /health:
    get:
      operationId: health
      tags: [System]
      summary: Health check
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: "0.1.0"

  /sandboxes:
    get:
      operationId: listSandboxes
      tags: [Sandboxes]
      summary: List all sandboxes
      description: |
        Returns sandboxes belonging to the authenticated team, optionally
        filtered by metadata tags.

        ## Filtering by metadata

        Any query parameter prefixed `metadata.` is treated as a filter
        clause: `?metadata.env=prod&metadata.owner=agent-7`. Multiple
        filters AND together — a sandbox matches only if every key/value
        pair is present in its metadata. Values are compared as exact
        strings; there is no type coercion or substring matching.
      security:
        - apiKey: []
      parameters:
        - name: metadata.{key}
          in: query
          required: false
          description: |
            Filter sandboxes whose metadata contains an exact `{key}: <value>`
            pair. Repeat with different keys to AND multiple filters. Values
            are always strings. Example: `?metadata.env=prod`.
          schema:
            type: string
      responses:
        "200":
          description: List of sandboxes belonging to the authenticated team
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SandboxResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      operationId: createSandbox
      tags: [Sandboxes]
      summary: Create a new sandbox
      description: |
        Creates a sandbox and returns immediately with `status: starting`.
        The VM boots asynchronously. Poll `GET /sandboxes/{id}` until
        `status` is `active` before running commands.
      security:
        - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSandboxRequest"
      responses:
        "201":
          description: Sandbox created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SandboxResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"

  /sandboxes/{sandbox_id}:
    parameters:
      - $ref: "#/components/parameters/SandboxId"

    get:
      operationId: getSandbox
      tags: [Sandboxes]
      summary: Get a sandbox by ID
      security:
        - apiKey: []
      responses:
        "200":
          description: Sandbox details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SandboxResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      operationId: deleteSandbox
      tags: [Sandboxes]
      summary: Delete a sandbox
      security:
        - apiKey: []
      responses:
        "204":
          description: Sandbox deleted
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

    patch:
      operationId: patchSandbox
      tags: [Sandboxes]
      summary: Partially update a running sandbox
      description: |
        Applies a partial update to a running sandbox. Each top-level field
        in the request body is optional; only fields that are present are
        applied. Omitted top-level fields are left unchanged. Nested objects
        are full replacements when present — to clear a list, send it as an
        empty array.

        At least one top-level field must be present, otherwise the request
        is rejected with `400`. Unknown top-level fields are also rejected
        with `400` so typos surface as errors instead of silent no-ops.

        ## Currently patchable fields

        - `network` — replaces the egress allow/deny rules. The sandbox
          must be in the `active` state; patching a paused sandbox
          returns `409`. Rules take effect immediately and are persisted so
          they survive a future pause/resume cycle.
        - `metadata` — replaces the sandbox's metadata tags. Can be updated
          regardless of sandbox state (active, paused).
      security:
        - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SandboxPatch"
      responses:
        "204":
          description: Patch applied
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /sandboxes/{sandbox_id}/pause:
    parameters:
      - $ref: "#/components/parameters/SandboxId"

    post:
      operationId: pauseSandbox
      tags: [Sandboxes]
      summary: Pause a running sandbox
      description: |
        Snapshots the sandbox's full state (memory + disk), suspends the VM,
        and transitions to `paused`. Resume it later to continue exactly where
        it left off.
      security:
        - apiKey: []
      responses:
        "200":
          description: Sandbox is now paused
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SandboxResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /sandboxes/{sandbox_id}/resume:
    parameters:
      - $ref: "#/components/parameters/SandboxId"

    post:
      operationId: resumeSandbox
      tags: [Sandboxes]
      summary: Resume a paused sandbox
      description: |
        Restores the sandbox from its paused snapshot. Transitions back to
        `active` with all state intact — same memory, same processes, same files.
      security:
        - apiKey: []
      responses:
        "200":
          description: Sandbox is now active
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SandboxResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"


  /sandboxes/{sandbox_id}/exec:
    parameters:
      - $ref: "#/components/parameters/SandboxId"

    post:
      operationId: execCommand
      tags: [Exec]
      summary: Execute a command inside a sandbox
      description: |
        Runs a command inside the sandbox and waits for it to finish, returning
        stdout, stderr, and exit code. Idle sandboxes are automatically resumed
        before execution.
      security:
        - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExecRequest"
      responses:
        "200":
          description: Command executed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecResult"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /sandboxes/{sandbox_id}/exec/stream:
    parameters:
      - $ref: "#/components/parameters/SandboxId"

    post:
      operationId: execCommandStream
      tags: [Exec]
      summary: Execute a command and stream output via SSE
      description: |
        Runs a command and streams stdout/stderr chunks as Server-Sent Events.
        Each event is a JSON payload. The final event includes `exit_code` and
        `finished: true`. Idle sandboxes are automatically resumed before execution.
      security:
        - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExecRequest"
      responses:
        "200":
          description: >
            SSE stream. Each line starting with `data: ` contains a JSON
            `ExecStreamEvent`. The final event has `finished: true`.
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/ExecStreamEvent"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /templates:
    get:
      operationId: listTemplates
      tags: [Templates]
      summary: List templates visible to the caller
      description: |
        Returns the caller's team's templates plus the curated system
        templates (available to everyone). Filter by `alias_prefix=<text>`.
      security:
        - apiKey: []
      parameters:
        - name: alias_prefix
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TemplateResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      operationId: createTemplate
      tags: [Templates]
      summary: Create a template (status pending)
      description: |
        Creates a template row in `pending` status. The actual build is
        kicked off by `POST /templates/{template_id}/builds`. Splitting
        creation from build lets clients validate the spec, see the assigned
        ID, and decide when to start the build.
      security:
        - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTemplateRequest"
      responses:
        "201":
          description: Template created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"

  /templates/{template_id}:
    parameters:
      - $ref: "#/components/parameters/TemplateId"

    get:
      operationId: getTemplate
      tags: [Templates]
      summary: Get a template by ID
      security:
        - apiKey: []
      responses:
        "200":
          description: Template details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      operationId: deleteTemplate
      tags: [Templates]
      summary: Soft-delete a template
      description: |
        Soft-deletes a template owned by the caller's team. Returns `409`
        if any non-destroyed sandbox still references this template; the
        caller must destroy those sandboxes first.
      security:
        - apiKey: []
      responses:
        "204":
          description: Template deleted
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /templates/{template_id}/builds:
    parameters:
      - $ref: "#/components/parameters/TemplateId"

    get:
      operationId: listTemplateBuilds
      tags: [Templates]
      summary: List recent builds for a template
      security:
        - apiKey: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: List of builds, newest first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TemplateBuildResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      operationId: createTemplateBuild
      tags: [Templates]
      summary: Kick off a build for this template
      description: |
        Inserts a build row in `pending` status. The control plane's build
        supervisor picks it up on its next tick (within 30 seconds).

        ## Idempotency

        If an in-flight build (`pending`/`building`/`snapshotting`) already
        exists for this template with the same `build_spec_hash`, this
        endpoint returns the existing build's id with `200` instead of
        creating a duplicate.
      security:
        - apiKey: []
      responses:
        "201":
          description: Build created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateBuildResponse"
        "200":
          description: Existing in-flight build returned (idempotent)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateBuildResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          description: Per-team build concurrency limit reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/InternalError"

  /templates/{template_id}/builds/{build_id}:
    parameters:
      - $ref: "#/components/parameters/TemplateId"
      - $ref: "#/components/parameters/BuildId"

    get:
      operationId: getTemplateBuild
      tags: [Templates]
      summary: Get a build by ID
      security:
        - apiKey: []
      responses:
        "200":
          description: Build details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateBuildResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      operationId: cancelTemplateBuild
      tags: [Templates]
      summary: Cancel an in-flight build
      description: |
        Marks the build as `cancelled` and signals vmd to tear down any
        in-progress build VM. No-op for builds already in a terminal state.
      security:
        - apiKey: []
      responses:
        "204":
          description: Build cancelled (or was already terminal)
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /templates/{template_id}/builds/{build_id}/logs:
    parameters:
      - $ref: "#/components/parameters/TemplateId"
      - $ref: "#/components/parameters/BuildId"

    get:
      operationId: streamTemplateBuildLogs
      tags: [Templates]
      summary: Stream build logs via SSE
      description: |
        Server-Sent Events stream of the build's stdout/stderr. Connecting
        replays buffered output from the start of the build, then streams
        live as it arrives. Closes when the build reaches a terminal state.
      security:
        - apiKey: []
      responses:
        "200":
          description: SSE stream of build log events
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/BuildLogEvent"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-API-Key

  parameters:
    SandboxId:
      name: sandbox_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: The unique identifier of the sandbox.

    TemplateId:
      name: template_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: The unique identifier of the template.

    BuildId:
      name: build_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: The unique identifier of the template build.

  schemas:
    CreateSandboxRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 64
          description: Human-readable name for the sandbox.
        from_template:
          type: string
          description: >
            Boot the sandbox from a template. Accepts either a template UUID
            or an alias (e.g. `python-ml`). The template must be owned by
            the caller's team OR be a curated system template. The template's
            vCPU, memory, and disk values are inherited by the sandbox — they
            cannot be overridden per-sandbox because the snapshot dictates
            VM shape.
        timeout_seconds:
          type: integer
          format: int32
          minimum: 1
          maximum: 604800
          description: >
            Optional hard lifetime cap in seconds, measured from sandbox
            creation. When set, the sandbox is destroyed this many seconds
            after creation regardless of state (active, paused) or
            activity — the user asked for a hard deadline.
            When unset, the sandbox lives until explicitly paused or
            deleted. Maximum 604800 (7 days).
        metadata:
          type: object
          additionalProperties:
            type: string
          description: |
            Flat string-to-string tags attached to the sandbox at creation.
            Useful for grouping, owner labels, environment, run IDs, etc.

            ## Constraints
              - **Strings only.** Values must be strings. There is no type
                coercion: `metadata.count=42` filters for the *string* "42".
              - **At most 64 keys.**
              - Each key may be at most **256 bytes**.
              - Each value may be at most **2048 bytes** (2 KB).
              - The serialized object may be at most **16384 bytes** (16 KB)
                in total.
              - Keys starting with `superserve.` or `_superserve` (case-
                insensitive) are reserved for platform use and rejected.

            Metadata can be updated after creation via `PATCH /sandboxes/:id`.
            Filter sandboxes by metadata via the `metadata.{key}` query
            parameter on `GET /sandboxes`.
          example:
            env: prod
            owner: agent-7
        env_vars:
          type: object
          additionalProperties:
            type: string
          description: |
            Environment variables injected into every process inside the
            sandbox (terminal sessions, exec calls). Not persisted in the
            database — they live in the VM agent's memory for the sandbox's
            lifetime and survive pause/resume via snapshot.
          example:
            OPENAI_API_KEY: sk-...
            DEBUG: "1"
            run_id: 7f3c-21
        env_vars:
          type: object
          additionalProperties:
            type: string
          description: |
            Environment variables injected into every process inside the
            sandbox (terminal sessions, exec calls). Not persisted in the
            database — they live in the VM agent's memory for the sandbox's
            lifetime and survive pause/resume via snapshot.
          example:
            OPENAI_API_KEY: sk-...
            DEBUG: "1"
        network:
          $ref: "#/components/schemas/NetworkConfig"

    SandboxResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
          enum: [starting, active, pausing, paused, deleted]
        vcpu_count:
          type: integer
        memory_mib:
          type: integer
        access_token:
          type: string
          description: |
            Per-sandbox HMAC access token for data-plane operations
            (file upload/download, terminal). Pass as `X-Access-Token`
            header when hitting the edge proxy at
            `boxd-{id}.sandbox.superserve.ai`. Reusable for the
            lifetime of the sandbox.
        snapshot_id:
          type: string
          format: uuid
          description: ID of the latest snapshot (present after a pause).
        created_at:
          type: string
          format: date-time
        timeout_seconds:
          type: integer
          format: int32
          description: >
            Hard lifetime cap in seconds from creation, if set at creation
            time. Absent when no cap was configured.
        network:
          $ref: "#/components/schemas/NetworkConfig"
          description: >
            Current egress allow/deny rules, if any have been configured.
            Absent when the sandbox uses default network settings.
        metadata:
          type: object
          additionalProperties:
            type: string
          description: >
            User-supplied tags attached at creation. Always present —
            sandboxes created without metadata return `{}` rather than
            being absent.
          example:
            env: prod
            owner: agent-7

    ExecStreamEvent:
      type: object
      description: A single SSE event payload emitted by the exec/stream endpoint.
      properties:
        timestamp:
          type: string
          format: date-time
        stdout:
          type: string
          description: Stdout chunk (present when the process wrote to stdout).
        stderr:
          type: string
          description: Stderr chunk (present when the process wrote to stderr).
        exit_code:
          type: integer
          description: Process exit code (present on the final event).
        finished:
          type: boolean
          description: True on the final event.
        error:
          type: string
          description: Error message if the exec itself failed (present on the final event on error).

    ExecRequest:
      type: object
      required: [command]
      properties:
        command:
          type: string
          minLength: 1
          description: Command to execute. Wrapped in `/bin/sh -c` unless `args` is provided.
        args:
          type: array
          items:
            type: string
          description: If provided, `command` is used as the binary and `args` as arguments (no shell wrapping).
        env:
          type: object
          additionalProperties:
            type: string
          description: Environment variables for the command.
        working_dir:
          type: string
          description: Working directory (default /home/user).
        timeout_s:
          type: integer
          default: 30
          description: Timeout in seconds.

    ExecResult:
      type: object
      properties:
        stdout:
          type: string
        stderr:
          type: string
        exit_code:
          type: integer

    NetworkConfig:
      type: object
      description: >
        Egress network rules for a sandbox. `allow_out` accepts CIDRs
        (e.g. `8.8.8.8/32`) and domain names (e.g. `api.openai.com`,
        `*.github.com`). `deny_out` accepts CIDRs only.
        Private ranges (10/8, 172.16/12, 192.168/16, 127/8, 169.254/16)
        are always blocked regardless of rules.
      properties:
        allow_out:
          type: array
          items:
            type: string
          description: CIDRs or domains to allow.
          example: ["api.openai.com", "*.github.com", "8.8.8.8/32"]
        deny_out:
          type: array
          items:
            type: string
          description: CIDRs to deny. Use `0.0.0.0/0` to block all traffic not in `allow_out`.
          example: ["0.0.0.0/0"]

    SandboxPatch:
      type: object
      description: |
        Partial update body for `PATCH /sandboxes/{sandbox_id}`. Each
        top-level field is optional; only fields that are present are
        applied. Omitted fields are left unchanged. Nested objects are
        full replacements when present — to clear a list, send it as an
        empty array.

        At least one top-level field must be set, otherwise the request
        is rejected with `400`. Unknown fields are also rejected with
        `400`.
      properties:
        network:
          allOf:
            - $ref: "#/components/schemas/NetworkConfig"
          description: |
            Replace the sandbox's egress rules. The sandbox must be in
            the `active` state. The provided `allow_out` and `deny_out`
            lists fully replace whatever was previously configured.
        metadata:
          type: object
          additionalProperties:
            type: string
          description: |
            Replace the sandbox's metadata tags. Fully replaces the existing
            metadata — omitted keys are removed. Can be patched regardless of
            sandbox state. Same validation limits as on create (64 keys,
            256-byte keys, 2 KB values, 16 KB total).
      example:
        metadata:
          env: prod
          owner: agent-7

    BuildSpec:
      type: object
      required: [from]
      description: |
        Canonical declaration of how to build a template. The server is the
        source of truth for this schema; SDKs are thin clients that produce it.
      properties:
        from:
          type: string
          description: >
            OCI image reference for the base. Examples: `python:3.11`,
            `node:22-slim`, `ghcr.io/myorg/foo:v1`. Resolved to a digest at
            build time and recorded for reproducibility. Must be a Linux/amd64
            image. Alpine and distroless bases are rejected at validation.
          example: python:3.11
        steps:
          type: array
          items:
            $ref: "#/components/schemas/BuildStep"
          description: Ordered list of build steps executed inside the build VM.
        start_cmd:
          type: string
          description: >
            Optional command started after build steps complete. The snapshot
            captures the running process, so sandboxes restored from this
            template come up with the process already live.
        ready_cmd:
          type: string
          description: >
            Optional readiness probe. Polled every 2s after `start_cmd`, until
            it exits 0 or 10 minutes elapse. Use to wait for a server to bind
            its port before snapshotting.

    BuildStep:
      type: object
      description: |
        A single build step. Exactly one of `run`, `copy`, `env`, or
        `workdir` must be set.
      properties:
        run:
          type: string
          description: Shell command. Wrapped in `/bin/sh -c` inside the build VM.
          example: pip install -r requirements.txt
        copy:
          type: object
          required: [src, dst]
          properties:
            src:
              type: string
              description: >
                Base64-encoded tar archive of files to copy into the VM. V1 caps
                this at 1 MB; larger payloads must use the V2 presigned-upload
                path.
            dst:
              type: string
              description: Absolute path inside the VM to extract into.
        env:
          type: object
          required: [key, value]
          properties:
            key:
              type: string
            value:
              type: string
        workdir:
          type: string
          description: Working directory for subsequent steps.

    CreateTemplateRequest:
      type: object
      required: [alias, build_spec]
      properties:
        alias:
          type: string
          minLength: 1
          maxLength: 128
          description: >
            Human-readable name, unique per team. Used as the
            `from_template` value when creating sandboxes.
          example: my-python-env
        vcpu:
          type: integer
          minimum: 1
          maximum: 4
          default: 1
        memory_mib:
          type: integer
          minimum: 256
          maximum: 4096
          default: 1024
        disk_mib:
          type: integer
          minimum: 1024
          maximum: 8192
          default: 4096
        build_spec:
          $ref: "#/components/schemas/BuildSpec"

    TemplateResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        team_id:
          type: string
          format: uuid
        alias:
          type: string
        status:
          type: string
          enum: [pending, building, ready, failed]
        vcpu:
          type: integer
        memory_mib:
          type: integer
        disk_mib:
          type: integer
        size_bytes:
          type: integer
          format: int64
          description: On-disk size of the template's snapshot bundle (present once `ready`).
        error_message:
          type: string
          description: Last build's error message, if status is `failed`.
        created_at:
          type: string
          format: date-time
        built_at:
          type: string
          format: date-time
          description: When the template most recently transitioned to `ready`.

    TemplateBuildResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        template_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, building, snapshotting, ready, failed, cancelled]
        build_spec_hash:
          type: string
          description: Stable hash of the build_spec at submission time. Used for idempotent submits.
        error_message:
          type: string
        started_at:
          type: string
          format: date-time
        finalized_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    BuildLogEvent:
      type: object
      description: A single SSE event from the build log stream.
      properties:
        timestamp:
          type: string
          format: date-time
        stream:
          type: string
          enum: [stdout, stderr, system]
          description: >
            `stdout`/`stderr` are forwarded from the build VM. `system` is
            the supervisor's own status text (step boundaries, snapshot
            phase, terminal status).
        text:
          type: string
        finished:
          type: boolean
          description: True on the final event.
        status:
          type: string
          enum: [ready, failed, cancelled]
          description: Terminal status, present on the final event.

    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Missing or invalid API key
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: Sandbox is not in a valid state for this operation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
